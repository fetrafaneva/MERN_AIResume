version: '3'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ****
      MONGO_INITDB_ROOT_PASSWORD: ****
    volumes:
      - ./mongodb_data:/data/db

  backend:
    build: .
    container_name: resume-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb