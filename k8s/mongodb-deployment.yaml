apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
        - name: mongodb
          image: mongo:6

          ports:
            - containerPort: 27017

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "200m"
              memory: "512Mi"

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
